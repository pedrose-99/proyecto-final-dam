
services:
  postgres:
    image: postgres:16-alpine
    container_name: smartcart-db
    environment:
      POSTGRES_DB: smartcart
      POSTGRES_USER: smartcart
      POSTGRES_PASSWORD: smartcart123
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartcart -d smartcart"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: smartcart-backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8080"
    env_file:
      - ./backend/.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/smartcart
      SPRING_DATASOURCE_USERNAME: smartcart
      SPRING_DATASOURCE_PASSWORD: smartcart123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

  frontend:
    build: ./frontend
    container_name: smartcart-frontend
    depends_on:
      - backend
    ports:
      - "4200:4200"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/angular.json:/app/angular.json
    environment:
      - WATCHPACK_POLLING=true

volumes:
  postgres_data:
