
services:
  postgres:
    image: postgres:16-alpine
    container_name: smartcart-db
    environment:
      POSTGRES_DB: smartcart
      POSTGRES_USER: smartcart
      POSTGRES_PASSWORD: smartcart123
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartcart -d smartcart"]
      interval: 5s
      timeout: 5s
      retries: 10

  scraper-python:
    build: ./scraper-python
    container_name: smartcart-scraper-python
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G

  backend:
    build: ./backend
    container_name: smartcart-backend
    depends_on:
      postgres:
        condition: service_healthy
      scraper-python:
        condition: service_healthy
    ports:
      - "8081:8080"
    env_file:
      - ./backend/.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/smartcart
      SPRING_DATASOURCE_USERNAME: smartcart
      SPRING_DATASOURCE_PASSWORD: smartcart123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      PYTHON_SCRAPER_URL: http://scraper-python:8000
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  frontend:
    build: ./frontend
    container_name: smartcart-frontend
    depends_on:
      - backend
    ports:
      - "4200:4200"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/angular.json:/app/angular.json
    environment:
      - WATCHPACK_POLLING=true

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  postgres_data: