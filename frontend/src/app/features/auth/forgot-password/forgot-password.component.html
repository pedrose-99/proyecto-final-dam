<div class="forgot-password-container">
  <mat-card class="forgot-password-card">
    <div class="auth-logo">
      <img src="assets/images/logo.png" alt="SmartCart" class="auth-logo-img">
    </div>
    <mat-card-header>
      <mat-card-title>¿Olvidaste tu contraseña?</mat-card-title>
      <mat-card-subtitle>Te enviaremos una nueva contraseña por email</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" placeholder="tu@email.com">
          <mat-icon matSuffix>email</mat-icon>
          <mat-error *ngIf="forgotPasswordForm.get('email')?.hasError('required')">
            El email es obligatorio
          </mat-error>
          <mat-error *ngIf="forgotPasswordForm.get('email')?.hasError('email')">
            Ingresa un email válido
          </mat-error>
        </mat-form-field>

        <div class="success-message" *ngIf="successMessage">
          <mat-icon>check_circle</mat-icon>
          <span>{{ successMessage }}</span>
        </div>

        <div class="error-message" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

        <button mat-raised-button color="primary" type="submit" class="full-width submit-btn"
                [disabled]="forgotPasswordForm.invalid || isLoading">
          <mat-spinner diameter="20" *ngIf="isLoading"></mat-spinner>
          <span *ngIf="!isLoading">Enviar nueva contraseña</span>
        </button>

      </form>
    </mat-card-content>

    <mat-card-actions>
      <p>¿Recordaste tu contraseña? <a routerLink="/login">Inicia sesión</a></p>
    </mat-card-actions>
  </mat-card>
</div>
